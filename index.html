<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LIBELY - Fashion Store</title>
    
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header" role="banner">
    <div class="header__inner">
      <a href="#" class="header__logo">LIB<span>E</span>LY</a>  

      <div class="search-wrap" role="search">
        <svg class="search-wrap__icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          type="search"
          id="searchInput"
          class="search-input"
          placeholder="Cari produk"
          aria-label="Cari produk"
          autocomplete="off"
        />
      </div>

      <button class="cart-btn" id="cartBtn" aria-label="Keranjang belanja">
        <svg class="cart-btn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 01-8 0"/>
        </svg>
        <span class="cart-badge" id="cartBadge" aria-live="polite">0</span>
      </button>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero" id="hero" aria-label="Tagline">
    <p class="hero__label">Koleksi Terbaik LIBELY</p>
    <h1 class="hero__title">Temukan Produk <em>Pilihan</em> Anda</h1>
  </section>

  <!-- TABS -->
  <nav class="tabs-wrap" aria-label="Filter kategori">
    <div class="tabs" id="tabsContainer" role="tablist">
      <!-- Rendered by JS -->
    </div>
    <div class="sort-wrap">
      <select id="sortSelect" class="sort-select" aria-label="Urutkan harga">
        <option value="default">Urutkan</option>
        <option value="asc">Termurah</option>
        <option value="desc">Termahal</option>
      </select>
    </div>
</nav>

  <!-- MAIN -->
  <main class="main" id="main">
    <div class="products-grid" id="productsGrid" role="list" aria-label="Daftar produk">
      <!-- Rendered by JS -->
    </div>
  </main>

<!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalName">
    <div class="modal" id="modal">
      <div class="modal__inner">
        <div class="modal__image-wrap" id="modalImageWrap">
          <!-- Filled by JS -->
        </div>
        <div class="modal__content" id="modalContent">
          <button class="modal__close" id="modalClose" aria-label="Tutup detail produk">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
          <p class="modal__category" id="modalCategory"></p>
          <h2 class="modal__name" id="modalName"></h2>
          <p class="modal__price" id="modalPrice"></p>
          <div class="modal__divider"></div>
          <p class="modal__desc" id="modalDesc"></p>
          <button class="modal__add-btn" id="modalAddBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/>
            </svg>
            Tambah ke Keranjang
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast" aria-live="assertive"></div>

  <!-- CART SIDEBAR -->
<div class="cart-backdrop" id="cartBackdrop" onclick="closeCartSidebar()"></div>
<aside class="cart-sidebar" id="cartSidebar" aria-label="Keranjang belanja">
    <div class="cart-sidebar__header">
        <h2 class="cart-sidebar__title">Keranjang Belanja</h2>
        <button class="cart-sidebar__close" onclick="closeCartSidebar()" aria-label="Tutup keranjang">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </button>
    </div>
    <div class="cart-sidebar__body" id="cartSidebarBody"></div>
    <div class="cart-sidebar__footer" id="cartSidebarFooter"></div>
</aside>

  <!-- FOOTER -->
  <footer class="footer">
    <strong>LIBELY</strong> &nbsp;·&nbsp; Fashion Store &nbsp;·&nbsp; © 2025
  </footer>

  <script src="script.js"></script>
</body>
</html>
